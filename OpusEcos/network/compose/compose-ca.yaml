version: '3.7'

services:

  ca.opusecos.net:
    image: hyperledger/fabric-ca:1.5.17

    container_name: ca.opusecos.net

    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.opusecos.net
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054

    ports:
      - "7054:7054"

    command: >
      sh -c '
      fabric-ca-server start
      -b admin:adminpw
      -d
      '

    volumes:
      - ../organizations/fabric-ca:/etc/hyperledger/fabric-ca-server

    networks:
      - opus

networks:

  opus:
    name: opus_network
    